name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # Real dependencies, so the integration tests exercise Postgres + pgvector for
    # real rather than skipping. The Postgres image ships the vector extension the
    # migration and KPI service rely on.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: community_management
          POSTGRES_PASSWORD: community_management
          POSTGRES_DB: community_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U community_management -d community_management_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # A dedicated test database (name contains "test"), kept distinct from
      # DATABASE_URL so the suite's safety guard never targets the app database.
      DATABASE_URL: postgresql+psycopg://community_management:community_management@localhost:5432/community_management
      TEST_DATABASE_URL: postgresql+psycopg://community_management:community_management@localhost:5432/community_management_test
      REDIS_URL: redis://localhost:6379/0
      API_KEY: change-me

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check . --output-format=github

      - name: Run tests
        run: pytest --cov=app/analytics --cov-report=term-missing
