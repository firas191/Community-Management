# Community Management stack. `docker compose up --build` brings up all five services.
# The api waits for postgres and redis to be healthy before starting.

name: community_management

services:
  db:
    # pgvector image = postgres 16 with the vector extension preinstalled,
    # so the migration's CREATE EXTENSION vector succeeds.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: community_management
      POSTGRES_PASSWORD: community_management
      POSTGRES_DB: community_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community_management -d community_management"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # Built once and shared by worker and beat (identical image), so the image is
    # exported and stored a single time, not three times.
    build: .
    image: community_management:app
    env_file: .env
    # Model weights download here on first use and persist across restarts.
    volumes:
      - hfcache:/models/hf
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    image: community_management:app
    env_file: .env
    volumes:
      - hfcache:/models/hf
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO

  beat:
    image: community_management:app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO

volumes:
  pgdata:
  hfcache:
